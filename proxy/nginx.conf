# Note: this is a config for proxy container only,
# this is not an example for your host nginx configuration.
worker_processes 1;
events { worker_connections 1024; }

http {
    upstream frontend {
        server "frontend:3000";
    }
    upstream backend {
        server "backend:5000";
    }

    server {
        listen 80;
        server_name _;
        server_tokens off;

        send_timeout 30s;
        proxy_connect_timeout 10s;
        proxy_read_timeout 90s;
        proxy_send_timeout 60s;

        # Compress responses for faster delivery
        gzip on;
        gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/rss+xml image/svg+xml;
        gzip_vary on;
        gzip_min_length 512;

        location /api {
            # Reject uncommon/unsafe HTTP methods
            limit_except GET HEAD POST PUT DELETE OPTIONS {
                deny all;
            }

            proxy_pass http://backend/api;
            proxy_http_version 1.1;

            # Connection management for keep-alive
            proxy_set_header Connection "";

            # Backend container hostname (not client's Host header)
            proxy_set_header Host $proxy_host;

            # Get client IP through proxy chain (e.g., for DoS protection)
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # Original protocol/host from host nginx (for CORS, redirects, etc.)
            proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
            proxy_set_header X-Forwarded-Host $http_x_forwarded_host;

            # WebSocket upgrade support
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_cache_bypass $http_upgrade;
        }

        location / {
            # Reject uncommon/unsafe HTTP methods
            limit_except GET HEAD POST PUT DELETE OPTIONS {
                deny all;
            }

            proxy_pass http://frontend;
            proxy_http_version 1.1;

            # Connection management for keep-alive
            proxy_set_header Connection "";

            # Frontend container hostname
            proxy_set_header Host $proxy_host;

            # Get client IP through proxy chain (e.g., for DoS protection)
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # Original protocol/host from host nginx
            proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
            proxy_set_header X-Forwarded-Host $http_x_forwarded_host;
        }

        # Health check endpoint (internal only)
        location /nginx_status {
            stub_status on;
            allow 127.0.0.1;
            deny all;
        }

        # Allow large uploads
        client_max_body_size 50M;
    }
}
